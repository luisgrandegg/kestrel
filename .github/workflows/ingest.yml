name: Daily ingestion

on:
  schedule:
    # 23:30 UTC — well after the US close (20:00/21:00 UTC), with headroom
    # for GitHub cron lag: a late (or manually repeated) run is harmless
    # because the pipeline dedupes by UTC date. Weekend/holiday runs are
    # no-ops for the same reason (no new trading dates to add).
    - cron: "30 23 * * *"
  workflow_dispatch:

# Never two ingestion runs at once; a lagged cron queues behind the current
# run instead of racing it.
concurrency:
  group: daily-ingestion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run the throttled daily pipeline
        run: node dist/app/cli.js data/kestrel.db watchlist.json dashboard.md

      - name: Persist results (SQLite database + rendered dashboard)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/kestrel.db dashboard.md
          if git diff --cached --quiet; then
            echo "No changes to persist (weekend/holiday or repeated run)."
          else
            git commit -m "Daily ingestion $(date -u +%F)"
            git push
          fi
